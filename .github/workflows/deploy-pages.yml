# 将 portWebsite/ 子目录作为静态站点部署到 GitHub Pages
# 仓库 Settings → Pages → Source 须选「GitHub Actions」（勿用 branch / root）

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portWebsite

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
