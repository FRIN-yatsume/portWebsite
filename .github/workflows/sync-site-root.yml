# 将 portWebsite/ 同步到仓库根目录，供 GitHub Pages「从分支部署」直接读取
# 无需在 Settings 里切换 GitHub Actions

name: Sync site to root

on:
  push:
    branches: [main]
    paths:
      - "portWebsite/**"
      - ".github/workflows/sync-site-root.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync portWebsite to repository root
        run: |
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'portWebsite' \
            --exclude 'references' \
            --exclude 'README.md' \
            --exclude 'anan-shop-portfolio-SKILL.md' \
            --exclude '.vscode' \
            --exclude '_config.yml' \
            --exclude '_deploy_check.html' \
            portWebsite/ ./

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to sync"
          else
            git commit -m "chore: sync portWebsite to root for GitHub Pages"
            git push
          fi
